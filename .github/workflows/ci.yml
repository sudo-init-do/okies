name: Build & Publish Docker image

on:
  push:
    branches:
      - release     # or whatever branch you want to auto-deploy from

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # 1) Grab your code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2) Re-create .env
      - name: Recreate .env from secret
        run: echo "${{ secrets.DOTENV_FILE }}" > .env

      # 3) Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4) Build & push the image
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/okies-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/okies-backend:${{ github.sha }}
