# .github/workflows/ci.yml
name: CI & Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-live:
    name: Live‐route Tests (non-fatal)
    runs-on: ubuntu-latest
    continue-on-error: true         # <-- never block the pipeline here
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: npm ci
      - name: Run live‐route tests
        run: npm run test:live

  build:
    name: Build
    needs: test-live
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build

  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/develop'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build

      - name: Deploy via SSH (rsync)
        uses: appleboy/ssh-action@v0.1.7
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          port:     ${{ secrets.STAGING_SSH_PORT || '22' }}
          source:   "dist/**"
          target:   "/Users/deploy/okies-backend"
          rsync_opts: "-avz --delete"

      - name: Reload staging service
        uses: appleboy/ssh-action@v0.1.7
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          port:     ${{ secrets.STAGING_SSH_PORT || '22' }}
          script: |
            launchctl unload ~/Library/LaunchAgents/com.okies.backend.plist
            launchctl load   ~/Library/LaunchAgents/com.okies.backend.plist
