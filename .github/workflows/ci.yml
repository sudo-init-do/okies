name: Build & Publish Docker image

on:
  push:
    branches:
      - release    

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read       # to checkout your code
      packages: write      # to push to Docker Hub

    steps:
      # 1) Checkout your repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2) Re-create .env from the DOTENV_FILE secret
      - name: Restore .env
        run: echo "${{ secrets.DOTENV_FILE }}" > .env

      # 3) Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4) Build & push your image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/okies-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/okies-backend:${{ github.sha }}
