# .github/workflows/ci.yml

name: Build & Publish Docker image

on:
  push:
    branches: [ release ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # 1) Pull down your code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2) Recreate .env (including FIREBASE_SERVICE_ACCOUNT_B64)
      - name: Recreate .env from secret
        run: |
          # This will exactly recreate your .env file,
          # preserving any embedded newlines in the Base64 payload.
          printf "%s" "${{ secrets.DOTENV_FILE }}" > .env

      # 3) Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4) Build & push your Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/okies-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/okies-backend:${{ github.sha }}
